# AInvest 配置文件

# 数据源配置
data_source:
  provider: eastmoney           # 数据提供商: sina/tushare/eastmoney
  api_key: null               # API密钥(如有需要)
  api_secret: null            # API密钥(如有需要)
  timeout: 30                # 请求超时(秒)
  retry_times: 3             # 重试次数
  cache_enabled: true         # 启用缓存
  cache_ttl: 300             # 缓存TTL(秒)

# 策略配置
strategy:
  # 放量上涨策略
  volume_surge:
    min_volume_ratio: 2.0     # 最小放量倍数
    min_price_change: 1.0     # 最小涨幅%
    min_amount: 100000000     # 最小成交额
  
  # 成交额排名策略
  turnover_rank:
    top_n: 20                # 取前N名
    min_amount: 500000000     # 最小成交额
    sort_desc: true          # 降序排列
  
  # 多因子策略
  multi_factor:
    volume_weight: 0.2        # 成交量因子权重
    price_weight: 0.3        # 价格因子权重
    turnover_weight: 0.25     # 换手率因子权重
    tech_weight: 0.25         # 技术面因子权重
    min_score: 60             # 最低评分门槛
  
  # AI技术面策略
  ai_technical:
    pattern_threshold: 0.75    # 形态识别阈值
    trend_confidence: 0.70    # 趋势置信度
  
  # 机构追踪策略
  institution:
    min_inst_count: 3         # 最少机构数
    min_inst_ratio: 0.05     # 最少机构持股比例

  # 综合策略权重配置（整合5大策略）
  composite_strategy:
    # 权重分配（总和=100%）
    strategy_count_weight: 0.35   # 放量上涨策略权重 (35%)
    myhhub_weight: 0.30            # 成交额排名策略权重 (30%)
    hikyuu_weight: 0.15            # 多因子策略权重 (15%)
    northstar_weight: 0.10          # AI技术面策略权重 (10%)
    # institution_weight: 0.10      # 机构追踪策略权重 (10%)
    base_win_rate: 0.50             # 胜率基础值 (50%)
    min_win_rate: 0.65             # 胜率门槛 (65%)

  # 基本面筛选条件
  fundamental_filter:
    min_roe: 0.08                  # ROE门槛 (≥8%)
    min_revenue_growth: 0.05       # 营收增长 (≥5%)
    min_profit_growth: 0.10        # 净利润增长门槛
    max_debt_ratio: 0.60           # 最大负债率

# 报告配置
report:
  format: html               # 报告格式: html/markdown/json
  template: default          # 模板名称
  include_charts: true       # 包含图表
  output_dir: ./output       # 输出目录
  max_stocks: 50            # 最大股票数

# 邮件配置
email:
  enabled: true              # 启用邮件发送
  debug_mode: true          # 调试模式（只发邮件不抄送）
  skip_money_flow: true     # 跳过耗时资金流向查询
  sender_name: "Marcus策略师"  # 发件人名称
  smtp_server: "smtp.qq.com"  # QQ邮箱SMTP服务器
  smtp_port: 465            # SSL端口
  smtp_user: "206731562@qq.com"  # 发送邮箱
  smtp_password: "veqtjscdtsbzbhbd"  # SMTP授权码
  to_emails:                # 收件人列表
    - "2210265283@qq.com"
  cc_emails:                # 抄送列表
    - "732016354@qq.com"
    - "850229452@qq.com"
  subject_prefix: "[Marcus量化选股]"  # 邮件主题前缀

# 全局设置
log_level: INFO             # 日志级别: DEBUG/INFO/WARNING/ERROR
max_workers: 4              # 最大并发数
enable_cache: true          # 启用缓存
